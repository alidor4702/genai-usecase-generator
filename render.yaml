# Render Blueprint — declarative deploy config for the backend.
#
# Two services here:
#  1. compastral-api      — FastAPI HTTP surface for the Vercel frontend.
#                           Endpoints: /healthz, /generate, /status/{id},
#                           /events/{id}, /report/{id}, /grounding/{id}.
#  2. compastral-worker   — Mistral Workflows worker that registers
#                           GenAIUseCaseWorkflow with the runtime so the
#                           assistant published to Le Chat actually has
#                           someone to fulfil its requests. MUST be on a
#                           paid plan; Render forbids worker services on
#                           the free tier (workers need to stay always-on
#                           and free instances sleep after 15min idle).
#
# The standalone Next.js app deploys separately on Vercel.
#
# Plan note: `free` for the API sleeps after 15min idle and kills SSE
# long-connections when the service goes to sleep mid-run. For a reliable
# demo, upgrade to `starter` ($7/mo, always-warm) in the Render dashboard.
# The Render UI's plan choice wins over what's in this file.

services:
  - type: web
    name: compastral-api
    runtime: python
    plan: free
    region: frankfurt        # closer to Mistral's EU infra
    branch: main
    rootDir: .
    buildCommand: pip install uv && uv sync --frozen
    startCommand: >
      uv run uvicorn src.api:app
      --host 0.0.0.0 --port $PORT
      --proxy-headers --forwarded-allow-ips '*'
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: MISTRAL_API_KEY
        sync: false          # set in Render dashboard, not committed
      - key: TAVILY_API_KEY
        sync: false
      - key: TIER
        value: standard
      # Lock CORS to the Vercel deployment. Set this in Render's UI to
      # the Vercel URL (e.g. https://compastral.vercel.app). Falls back
      # to "*" when unset — fine for local dev / curl, but tighten in
      # production. Comma-separated for multiple origins.
      - key: CORS_ORIGINS
        sync: false

  - type: worker
    name: compastral-worker
    runtime: python
    plan: starter            # workers MUST be paid; free not allowed
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run python -m scripts.run_worker
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      # Same Mistral + Tavily keys as the API service — set in Render
      # dashboard. Don't share across services automatically (`sync: false`)
      # because each service has its own env scope.
      - key: MISTRAL_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: TIER
        value: standard
      # The workflow id Mistral runtime registers under. Must match the
      # `name=` arg in the @workflow.define decorator (src/workflow.py).
      - key: DEPLOYMENT_NAME
        value: genai-usecase-generator
